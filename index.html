<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Training: De Taal-Wissel (Klassikaal)</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --pol: #1d4e89; --bg: #0f172a; --card: #1e293b; --gold: #ffd700; --white: #f1f5f9; --vanger: #10b981; --zender: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 30px; border-radius: 12px; border-top: 6px solid var(--pol); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .role-indicator { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2em; }
        .is-docent { background: var(--zender); color: black; border: 3px solid #b45309; }
        .is-student { background: var(--vanger); color: white; border: 3px solid #065f46; }

        .zin-box { background: rgba(0,0,0,0.4); border: 2px solid var(--pol); padding: 30px; margin: 20px 0; font-size: 1.5em; border-radius: 10px; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.5; }
        .highlight { color: var(--gold); font-weight: bold; text-decoration: underline; }
        
        .input-field { width: 100%; padding: 18px; font-size: 1.3em; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .btn { background: var(--pol); color: white; padding: 18px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-transform: uppercase; font-size: 1.1em; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #2563eb; transform: translateY(-2px); }

        #celebration-overlay {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            text-align: center;
            background: rgba(15, 23, 42, 0.95);
            padding: 40px;
            border-radius: 30px;
            border: 5px solid var(--gold);
        }
        .gif-img { width: 350px; border-radius: 15px; }
        .success-text { font-size: 2em; font-weight: bold; color: var(--gold); display: block; margin-top: 20px; }

        .btn-reset { background: var(--danger); margin-top: 50px; width: auto; font-size: 0.8em; padding: 10px 20px; opacity: 0.6; }
    </style>
</head>
<body>

<div id="celebration-overlay">
    <img src="gun-drop.gif" id="reward-gif" class="gif-img" alt="BOOM!">
    <span class="success-text">HELDERE TAAL!</span>
</div>

<div class="container">
    <h2>🔄 De Taal-Wissel: Klassikaal</h2>
    
    <div id="login-view">
        <p>Voer je naam in om deel te nemen.</p>
        <input type="text" id="naam" class="input-field" placeholder="Je naam (of 'Docent')...">
        <button onclick="startTraining()" class="btn">Start Sessie</button>
    </div>

    <div id="game-view" style="display:none;">
        <div id="role-box" class="role-indicator">Inloggen...</div>
        
        <div id="display-area">
            <p id="instruction" style="font-weight: bold; color: #94a3b8;"></p>
            <div id="content-box" class="zin-box">Laden...</div>
            
            <div id="input-area">
                </div>
        </div>

        <button onclick="resetSysteem()" class="btn btn-reset">Systeem Reset (Docent)</button>
    </div>
</div>

<script>
    // Firebase configuratie
    const firebaseConfig = {
        apiKey: "AIzaSyBOo2LzR1IBnsiBR2SCwPJABtaRv0tpKQ4",
        authDomain: "speeltuin-recherche.firebaseapp.com",
        databaseURL: "https://speeltuin-recherche-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "speeltuin-recherche",
        appId: "1:499912834123:web:3c84cbf4d5eb13131961ce"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const oefeningen = [
        {zin: "Ik trachtte de verdachte middels een <span class='highlight'>fysieke interventie</span> te belemmeren.", nieuw: "tackle"},
        {zin: "De verbalisant is <span class='highlight'>voornemens</span> proces-verbaal op te maken.", nieuw: "van plan"},
        {zin: "Kunt u de gemaakte kosten aan ons <span class='highlight'>voldoen</span>?", nieuw: "betalen"},
        {zin: "Wij verzoeken u het formulier te <span class='highlight'>retourneren</span>.", nieuw: "terugsturen"},
        {zin: "Er is een <span class='highlight'>mutatie</span> gedaan in de rapportage.", nieuw: "wijziging"},
        {zin: "Ik heb dit <span class='highlight'>heden</span> middag geconstateerd.", nieuw: "vandaag"},
        {zin: "De getuige is <span class='highlight'>separaat</span> van de verdachte gehoord.", nieuw: "apart"},
        {zin: "U dient <span class='highlight'>alvorens</span> het verhoor uw rechten te kennen.", nieuw: "voor"}
    ];

    let mijnNaam = "";
    let isDocent = false;

    function startTraining() {
        mijnNaam = document.getElementById('naam').value.trim();
        if(!mijnNaam) return;

        if(mijnNaam.toLowerCase() === "docent") {
            isDocent = true;
        }

        document.getElementById('login-view').style.display = "none";
        document.getElementById('game-view').style.display = "block";

        // Luister naar de centrale ronde-status
        db.ref('centrale_les').on('value', snap => {
            const data = snap.val() || { ronde: 0 };
            updateInterface(data);
        });
    }

    function updateInterface(data) {
        const rb = document.getElementById('role-box');
        const content = document.getElementById('content-box');
        const inputArea = document.getElementById('input-area');
        const inst = document.getElementById('instruction');

        const index = data.ronde % oefeningen.length;
        const huidigeOefening = oefeningen[index];

        if(isDocent) {
            rb.innerText = "MODUS: DOCENT 🎓";
            rb.className = "role-indicator is-docent";
            inst.innerText = "Huidige opgave voor de klas:";
            content.innerHTML = `
                <div>${huidigeOefening.zin}</div>
                <div style="margin-top:20px; color:var(--gold); font-size:0.8em;">Correct antwoord: ${huidigeOefening.nieuw}</div>
            `;
            inputArea.innerHTML = `<button onclick="volgendeZin()" class="btn">Volgende Zin voor Iedereen ➡️</button>`;
        } else {
            rb.innerText = "STUDENT: " + mijnNaam;
            rb.className = "role-indicator is-student";
            inst.innerText = "Vertaal de highlight naar normale taal:";
            content.innerHTML = huidigeOefening.zin;
            inputArea.innerHTML = `
                <input type="text" id="answer-input" class="input-field" placeholder="Typ je vertaling..." autocomplete="off">
                <button onclick="verifieer(${index})" class="btn">Check Vertaling</button>
            `;
            // Focus op input voor snelle verwerking
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }
    }

    function verifieer(index) {
        const input = document.getElementById('answer-input');
        const gok = input.value.toLowerCase().trim();
        const correct = oefeningen[index].nieuw;
        
        if(gok === correct || (gok.length > 2 && gok.includes(correct))) {
            toonCelebration();
            input.value = "";
        } else {
            alert("Nog niet helder genoeg! Probeer het opnieuw.");
        }
    }

    function volgendeZin() {
        db.ref('centrale_les').once('value', snap => {
            const huidigeRonde = (snap.val() && snap.val().ronde) || 0;
            db.ref('centrale_les').update({
                ronde: huidigeRonde + 1
            });
        });
    }

    function toonCelebration() {
        const overlay = document.getElementById('celebration-overlay');
        overlay.style.display = "block";
        const gif = document.getElementById('reward-gif');
        gif.src = gif.src; 
        setTimeout(() => { overlay.style.display = "none"; }, 2500);
    }

    function resetSysteem() {
        if(confirm("Sessie terugzetten naar de eerste zin?")) {
            db.ref('centrale_les').set({ ronde: 0 });
            if(isDocent) location.reload();
        }
    }
</script>
</body>
</html>
