        window.login = () => {
            const naam = document.getElementById('naam').value.trim().toUpperCase();
            myKlas = document.getElementById('klas-select').value;
            if(!naam || !myKlas) return alert("Vul naam en klas in.");

            myId = naam + "_" + Math.floor(Math.random() * 1000);
            const userRef = ref(db, `btv_p2p/${myKlas}/users/${myId}`);
            
            set(userRef, { naam: naam, status: 'searching', session: null });
            onDisconnect(userRef).remove();

            document.getElementById('auth-scherm').classList.add('hidden');
            document.getElementById('lobby-scherm').classList.remove('hidden');
            
            startMatchmaking();
        };

      function startMatchmaking() {
    const usersRef = ref(db, `btv_p2p/${myKlas}/users`);
    
    onValue(usersRef, (snapshot) => {
        const users = snapshot.val();
        if (!users || currentSessionId) return;

        // 1. Check of IK al door iemand anders ben gekoppeld (als Typer)
        if (users[myId] && users[myId].session) {
            currentSessionId = users[myId].session;
            off(usersRef); 
            startSession(currentSessionId, 'typer');
            return;
        }

        // 2. Zoek naar de 'oudste' andere wachtende student in de klas
        // We sorteren op wie het langst wacht om eerlijk te koppelen
        const waitingPartners = Object.keys(users)
            .filter(id => id !== myId && users[id].status === 'searching')
            .sort((a, b) => (users[a].timestamp || 0) - (users[b].timestamp || 0));

        if (waitingPartners.length > 0) {
            // Er is iemand! Ik word de Reader en maak de sessie aan.
            const partnerId = waitingPartners[0];
            currentSessionId = "sessie_" + myId + "_" + partnerId;
            
            const updates = {};
            updates[`btv_p2p/${myKlas}/users/${myId}/status`] = 'busy';
            updates[`btv_p2p/${myKlas}/users/${myId}/session`] = currentSessionId;
            updates[`btv_p2p/${myKlas}/users/${partnerId}/status`] = 'busy';
            updates[`btv_p2p/${myKlas}/users/${partnerId}/session`] = currentSessionId;

            update(ref(db), updates).then(() => {
                set(ref(db, `btv_p2p/${myKlas}/sessions/${currentSessionId}`), {
                    reader: myId,
                    typer: partnerId,
                    casusIdx: Math.floor(Math.random() * casusLijst.length), // Start met willekeurige casus
                    currentText: "",
                    approved: false,
                    points: 0
                });
                off(usersRef);
                startSession(currentSessionId, 'reader');
            });
        } else {
            // GEEN PARTNER GEVONDEN (Oneven aantal of eerste in de klas)
            // De student blijft in de lobby. De UI toont de spinner.
            // Zodra er een volgende student inlogt, zal DIE de match maken (stap 2 hierboven).
            console.log("Nog geen partner beschikbaar in klas " + myKlas);
        }
    });
}

                for (let id in users) {
                    if (id !== myId && users[id].status === 'searching') {
                        currentSessionId = "sessie_" + myId + "_" + id;
                        const updates = {};
                        updates[`btv_p2p/${myKlas}/users/${myId}/status`] = 'busy';
                        updates[`btv_p2p/${myKlas}/users/${myId}/session`] = currentSessionId;
                        updates[`btv_p2p/${myKlas}/users/${id}/status`] = 'busy';
                        updates[`btv_p2p/${myKlas}/users/${id}/session`] = currentSessionId;

                        update(ref(db), updates).then(() => {
                            set(ref(db, `btv_p2p/${myKlas}/sessions/${currentSessionId}`), {
                                reader: myId,
                                typer: id,
                                casusIdx: 0,
                                currentText: "",
                                approved: false,
                                points: 0
                            });
                            off(usersRef);
                            startSession(currentSessionId, 'reader');
                        });
                        break;
                    }
                }
            });
        }

        function startSession(sid, role) {
            myRole = role;
            document.getElementById('lobby-scherm').classList.add('hidden');
            document.getElementById('game-scherm').classList.remove('hidden');
            
            const sessionRef = ref(db, `btv_p2p/${myKlas}/sessions/${sid}`);
            onValue(sessionRef, (snap) => {
                const data = snap.val();
                if (!data) return;

                const casus = casusLijst[data.casusIdx];
                document.getElementById('casus-titel').innerText = casus.titel;
                document.getElementById('score').innerText = `Punten: ${data.points}`;

                if (myRole === 'reader') {
                    document.getElementById('reader-view').classList.remove('hidden');
                    document.getElementById('typer-view').classList.add('hidden');
                    document.getElementById('orig-tekst').innerText = casus.tekst;
                    document.getElementById('live-check').innerText = data.currentText || "...partner typt...";
                    document.getElementById('approve-btn').disabled = (data.currentText.length < 3 || data.approved);
                } else {
                    document.getElementById('reader-view').classList.add('hidden');
                    document.getElementById('typer-view').classList.remove('hidden');
                    document.getElementById('casus-hint').innerText = casus.hint;
                    
                    if (data.currentText === "" && !data.approved) {
                        document.getElementById('user-input').value = "";
                    }
                }

                if (data.approved && myRole === 'reader') {
                    setTimeout(() => nextRound(sid, data.points, data.casusIdx, data.reader, data.typer), 1500);
                }
            });
        }

        window.updateTyping = (val) => {
            if (currentSessionId && myRole === 'typer') {
                update(ref(db, `btv_p2p/${myKlas}/sessions/${currentSessionId}`), { currentText: val });
            }
        };

        window.approve = () => {
            if (currentSessionId && myRole === 'reader') {
                update(ref(db, `btv_p2p/${myKlas}/sessions/${currentSessionId}`), { approved: true });
            }
        };

        function nextRound(sid, points, idx, oldReader, oldTyper) {
            const nextIdx = (idx + 1) % casusLijst.length;
            // Rollen omdraaien voor de volgende ronde
            update(ref(db, `btv_p2p/${myKlas}/sessions/${sid}`), {
                approved: false,
                currentText: "",
                points: points + 1,
                casusIdx: nextIdx,
                reader: oldTyper, // Wissel rol
                typer: oldReader  // Wissel rol
            }).then(() => {
                // Lokale rol ook bijwerken
                myRole = (myRole === 'reader') ? 'typer' : 'reader';
            });
        }

        <div id="reader-view" class="hidden space-y-6">
            <div class="bg-white border-l-8 border-blue-900 p-6 shadow-md">

                <p id="orig-tekst" class="text-xl font-medium text-slate-800 italic"></p>
