<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV - Duo Training Systeem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, update, onDisconnect, off } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pvaangifteinleveren-77dbe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myKlas, myRole, currentSessionId;
        const casusLijst = [
            { id: 1, titel: "Huiselijk Geweld", tekst: "Elif Terzi huilt onbeheerst en heeft een rode vlek op haar wang." },
            { id: 2, titel: "Vermissing", tekst: "Peter van der Laan staat met zijn handen in het haar en roept paniekerig om Liam." },
            { id: 3, titel: "XTC Overlast", tekst: "Kevin Schut heeft extreem grote pupillen en een strakke kaakklem." },
            { id: 4, titel: "Alcohol", tekst: "Johannes Berends spreekt met dubbele tong en heeft bloeddoorlopen ogen." }
        ];

        window.login = () => {
            const naam = document.getElementById('naam').value.trim().toUpperCase();
            myKlas = document.getElementById('klas-select').value;
            if(!naam || !myKlas) return alert("Vul naam en klas in.");

            myId = naam + "_" + Math.floor(Math.random() * 1000);
            const userRef = ref(db, `btv_p2p/${myKlas}/users/${myId}`);
            
            // Initialiseer gebruiker als 'searching'
            set(userRef, { naam: naam, status: 'searching', session: null });
            onDisconnect(userRef).remove();

            document.getElementById('auth-scherm').classList.add('hidden');
            document.getElementById('lobby-scherm').classList.remove('hidden');
            
            startMatchmaking();
        };

        function startMatchmaking() {
            const usersRef = ref(db, `btv_p2p/${myKlas}/users`);
            
            onValue(usersRef, (snapshot) => {
                const users = snapshot.val();
                if (!users || currentSessionId) return;

                // 1. Check of IK al door iemand anders ben gekoppeld (als Typer)
                if (users[myId] && users[myId].session) {
                    currentSessionId = users[myId].session;
                    off(usersRef); // Stop met luisteren naar de lobby
                    startSession(currentSessionId, 'typer');
                    return;
                }

                // 2. Zoek zelf naar een partner die 'searching' is (als Reader)
                for (let id in users) {
                    if (id !== myId && users[id].status === 'searching') {
                        // Match gevonden!
                        currentSessionId = "sessie_" + myId + "_" + id;
                        
                        // Claim de sessie voor beide partijen
                        const updates = {};
                        updates[`btv_p2p/${myKlas}/users/${myId}/status`] = 'busy';
                        updates[`btv_p2p/${myKlas}/users/${myId}/session`] = currentSessionId;
                        updates[`btv_p2p/${myKlas}/users/${id}/status`] = 'busy';
                        updates[`btv_p2p/${myKlas}/users/${id}/session`] = currentSessionId;

                        update(ref(db), updates).then(() => {
                            set(ref(db, `btv_p2p/${myKlas}/sessions/${currentSessionId}`), {
                                reader: myId,
                                typer: id,
                                casusIdx: 0,
                                currentText: "",
                                approved: false,
                                points: 0
                            });
                            off(usersRef);
                            startSession(currentSessionId, 'reader');
                        });
                        break;
                    }
                }
            });
        }

        function startSession(sid, role) {
            myRole = role;
            document.getElementById('lobby-scherm').classList.add('hidden');
            document.getElementById('game-scherm').classList.remove('hidden');
            
            const sessionRef = ref(db, `btv_p2p/${myKlas}/sessions/${sid}`);
            onValue(sessionRef, (snap) => {
                const data = snap.val();
                if (!data) return;

                const casus = casusLijst[data.casusIdx];
                document.getElementById('casus-titel').innerText = casus.titel;
                document.getElementById('score').innerText = `Punten: ${data.points}`;

                if (myRole === 'reader') {
                    document.getElementById('reader-view').classList.remove('hidden');
                    document.getElementById('typer-view').classList.add('hidden');
                    document.getElementById('orig-tekst').innerText = casus.tekst;
                    document.getElementById('live-check').innerText = data.currentText || "...wachten op partner...";
                    document.getElementById('approve-btn').disabled = (data.currentText.length < 3 || data.approved);
                } else {
                    document.getElementById('reader-view').classList.add('hidden');
                    document.getElementById('typer-view').classList.remove('hidden');
                    document.getElementById('casus-hint').innerText = "Luister naar je partner en typ de tekst over.";
                    
                    // Alleen het tekstveld leegmaken als de sessie gereset is voor een nieuwe casus
                    if (data.currentText === "" && !data.approved) {
                        document.getElementById('user-input').value = "";
                    }
                }

                if (data.approved && myRole === 'reader') {
                    // Kleine vertraging voor de flow voordat de volgende casus laadt
                    setTimeout(() => nextCasus(sid, data.points, data.casusIdx), 1200);
                }
            });
        }

        window.updateTyping = (val) => {
            if (currentSessionId && myRole === 'typer') {
                update(ref(db, `btv_p2p/${myKlas}/sessions/${currentSessionId}`), { 
                    currentText: val,
                    approved: false 
                });
            }
        };

        window.approve = () => {
            if (currentSessionId && myRole === 'reader') {
                update(ref(db, `btv_p2p/${myKlas}/sessions/${currentSessionId}`), { approved: true });
            }
        };

        function nextCasus(sid, points, idx) {
            const nextIdx = (idx + 1) % casusLijst.length;
            update(ref(db, `btv_p2p/${myKlas}/sessions/${sid}`), {
                approved: false,
                currentText: "",
                points: points + 1,
                casusIdx: nextIdx
            });
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">

    <div id="auth-scherm" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 w-full max-w-sm border-t-8 border-yellow-500 shadow-2xl">
            <h1 class="font-black text-2xl text-blue-900 mb-6 uppercase tracking-tighter">Duo Training</h1>
            <input type="text" id="naam" placeholder="JOUW NAAM" class="w-full border p-4 mb-4 bg-slate-50 uppercase text-xs font-bold outline-none focus:border-blue-900">
            <select id="klas-select" class="w-full border p-4 mb-6 bg-slate-50 uppercase text-xs font-bold outline-none">
                <option value="ALFA">ALFA</option><option value="BRAVO">BRAVO</option>
                <option value="CHARLIE">CHARLIE</option><option value="DELTA">DELTA</option>
                <option value="ECHO">ECHO</option><option value="FOXTROT">FOXTROT</option>
                <option value="GOLF">GOLF</option><option value="HOTEL">HOTEL</option>
            </select>
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-4 font-bold uppercase text-xs tracking-widest hover:bg-blue-800 transition-colors">Start Zoeken</button>
        </div>
    </div>

    <div id="lobby-scherm" class="hidden fixed inset-0 bg-slate-100 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin h-10 w-10 border-4 border-blue-900 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="font-bold text-blue-900 uppercase tracking-widest text-xs">Wachten op partner in jouw klas...</p>
        </div>
    </div>

    <div id="game-scherm" class="hidden max-w-2xl mx-auto p-6">
        <header class="flex justify-between border-b-2 border-blue-900 pb-2 mb-8">
            <div id="score" class="font-black text-blue-900 text-xs">Punten: 0</div>
            <div id="casus-titel" class="font-black text-slate-400 text-xs uppercase tracking-widest"></div>
        </header>

        <div id="reader-view" class="hidden space-y-6">
            <div class="bg-blue-900 text-white p-6 rounded-lg shadow-lg">
                <h3 class="text-[10px] uppercase mb-2 opacity-70">Lees voor aan partner:</h3>
                <p id="orig-tekst" class="text-xl font-serif italic"></p>
            </div>
            <div class="bg-white border-2 border-slate-200 p-6">
                <h3 class="text-[10px] uppercase mb-4 text-slate-400">Live invoer partner:</h3>
                <p id="live-check" class="font-mono text-sm min-h-[50px] text-slate-700 whitespace-pre-wrap"></p>
                <button id="approve-btn" onclick="approve()" class="mt-6 w-full bg-emerald-600 text-white py-4 font-bold uppercase text-xs hover:bg-emerald-700 disabled:opacity-30 transition-opacity">Akkoord (Volgende)</button>
            </div>
        </div>

        <div id="typer-view" class="hidden space-y-6">
            <div class="bg-white border-2 border-blue-900 p-6 shadow-xl">
                <p id="casus-hint" class="text-xs font-bold text-blue-900 mb-6 uppercase italic"></p>
                <textarea id="user-input" oninput="updateTyping(this.value)" class="w-full h-40 p-4 font-mono text-sm bg-slate-50 border outline-none focus:border-blue-900" placeholder="Typ hier de tekst..."></textarea>
                <p class="mt-4 text-[9px] text-slate-400 uppercase">Je partner kijkt live mee en geeft akkoord.</p>
            </div>
        </div>
    </div>
</body>
</html>
