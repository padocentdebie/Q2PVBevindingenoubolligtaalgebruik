<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTV - Duo Training Systeem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRq1HFmhrpW_EMMZwpURrbTArz-L5iWT4",
            databaseURL: "https://pvaangifteinleveren-77dbe-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "pvaangifteinleveren-77dbe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myId, myKlas, myRole, pairId;
        const casusLijst = [
            { id: 1, titel: "Huiselijk Geweld", tekst: "Elif Terzi huilt onbeheerst en heeft een rode vlek op haar wang.", img: "verdriet.jpg" },
            { id: 2, titel: "Vermissing", tekst: "Peter van der Laan staat met zijn handen in het haar en roept paniekerig om Liam.", img: "paniek.jpg" },
            { id: 3, titel: "XTC Overlast", tekst: "Kevin Schut heeft extreem grote pupillen en een strakke kaakklem.", img: "drugs.jpg" },
            { id: 4, titel: "Alcohol", tekst: "Johannes Berends spreekt met dubbele tong en heeft bloeddoorlopen ogen.", img: "alcohol.jpg" }
        ];

        window.login = () => {
            const naam = document.getElementById('naam').value.trim().toUpperCase();
            myKlas = document.getElementById('klas-select').value;
            if(!naam || !myKlas) return alert("Vul naam en klas in.");

            myId = naam + "_" + Math.floor(Math.random() * 1000);
            const userRef = ref(db, `btv_p2p/${myKlas}/users/${myId}`);
            
            set(userRef, { naam: naam, status: 'searching', pair: null });
            onDisconnect(userRef).remove();

            document.getElementById('auth-scherm').classList.add('hidden');
            document.getElementById('lobby-scherm').classList.remove('hidden');
            findPartner();
        };

        function findPartner() {
            const klasRef = ref(db, `btv_p2p/${myKlas}/users`);
            onValue(klasRef, (snapshot) => {
                const users = snapshot.val();
                if (pairId) return;

                for (let id in users) {
                    if (id !== myId && users[id].status === 'searching') {
                        pairId = id;
                        const sessionId = myId + "_" + pairId;
                        
                        // Setup sessie
                        set(ref(db, `btv_p2p/${myKlas}/sessions/${sessionId}`), {
                            reader: myId,
                            typer: pairId,
                            casusIdx: 0,
                            currentText: "",
                            approved: false,
                            points: 0
                        });

                        // Update users
                        update(ref(db, `btv_p2p/${myKlas}/users/${myId}`), { status: 'busy', pair: pairId, session: sessionId });
                        update(ref(db, `btv_p2p/${myKlas}/users/${pairId}`), { status: 'busy', pair: myId, session: sessionId });
                        
                        startSession(sessionId, 'reader');
                        break;
                    }
                }
            });

            // Luister of iemand MIJ heeft gevonden
            onValue(ref(db, `btv_p2p/${myKlas}/users/${myId}/session`), (snap) => {
                if (snap.val() && !pairId) {
                    const sid = snap.val();
                    startSession(sid, 'typer');
                }
            });
        }

        function startSession(sid, role) {
            myRole = role;
            document.getElementById('lobby-scherm').classList.add('hidden');
            document.getElementById('game-scherm').classList.remove('hidden');
            
            onValue(ref(db, `btv_p2p/${myKlas}/sessions/${sid}`), (snap) => {
                const data = snap.val();
                if (!data) return;

                const casus = casusLijst[data.casusIdx];
                document.getElementById('casus-titel').innerText = casus.titel;
                document.getElementById('score').innerText = `Punten: ${data.points}`;

                if (myRole === 'reader') {
                    document.getElementById('reader-view').classList.remove('hidden');
                    document.getElementById('typer-view').classList.add('hidden');
                    document.getElementById('orig-tekst').innerText = casus.tekst;
                    document.getElementById('live-check').innerText = data.currentText || "...wachten op invoer...";
                    document.getElementById('approve-btn').disabled = data.currentText.length < 5;
                } else {
                    document.getElementById('reader-view').classList.add('hidden');
                    document.getElementById('typer-view').classList.remove('hidden');
                    document.getElementById('casus-hint').innerText = "Luister naar je partner en typ de objectieve PV-versie.";
                }

                if (data.approved) {
                    alert("Correct! Volgende casus.");
                    nextCasus(sid, data.points, data.casusIdx);
                }
            });
        }

        window.updateTyping = (val) => {
            const sid = myId.includes(pairId) ? pairId + "_" + myId : myId + "_" + pairId; // Simpele match check
            // Omdat session ID bepalen lastig is zonder opslag, gebruiken we de sessie uit de user data
            onValue(ref(db, `btv_p2p/${myKlas}/users/${myId}/session`), (snap) => {
                update(ref(db, `btv_p2p/${myKlas}/sessions/${snap.val()}`), { currentText: val });
            }, {onlyOnce: true});
        };

        window.approve = () => {
            onValue(ref(db, `btv_p2p/${myKlas}/users/${myId}/session`), (snap) => {
                update(ref(db, `btv_p2p/${myKlas}/sessions/${snap.val()}`), { approved: true });
            }, {onlyOnce: true});
        };

        function nextCasus(sid, points, idx) {
            const newIdx = (idx + 1) % casusLijst.length;
            update(ref(db, `btv_p2p/${myKlas}/sessions/${sid}`), {
                approved: false,
                currentText: "",
                points: points + 1,
                casusIdx: newIdx
            });
            document.getElementById('user-input').value = "";
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans">

    <div id="auth-scherm" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 w-full max-w-sm border-t-8 border-yellow-500 shadow-2xl">
            <h1 class="font-black text-2xl text-blue-900 mb-6 uppercase">Duo Training Login</h1>
            <input type="text" id="naam" placeholder="JOUW NAAM" class="w-full border p-4 mb-4 bg-slate-50 uppercase text-xs font-bold outline-none">
            <select id="klas-select" class="w-full border p-4 mb-6 bg-slate-50 uppercase text-xs font-bold outline-none">
                <option value="ALFA">ALFA</option><option value="BRAVO">BRAVO</option>
                <option value="CHARLIE">CHARLIE</option><option value="DELTA">DELTA</option>
                <option value="ECHO">ECHO</option><option value="FOXTROT">FOXTROT</option>
                <option value="GOLF">GOLF</option><option value="HOTEL">HOTEL</option>
                <option value="JULIETT">JULIETT</option><option value="KILO">KILO</option>
                <option value="LIMA">LIMA</option><option value="MIKE">MIKE</option>
            </select>
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-4 font-bold uppercase text-xs tracking-widest">Zoek Partner</button>
        </div>
    </div>

    <div id="lobby-scherm" class="hidden fixed inset-0 bg-slate-100 flex items-center justify-center">
        <div class="text-center">
            <div class="animate-spin h-10 w-10 border-4 border-blue-900 border-t-transparent rounded-full mx-auto mb-4"></div>
            <p class="font-bold text-blue-900 uppercase tracking-widest text-xs">Wachten op partner in klas...</p>
        </div>
    </div>

    <div id="game-scherm" class="hidden max-w-2xl mx-auto p-6">
        <header class="flex justify-between border-b-2 border-blue-900 pb-2 mb-8">
            <div id="score" class="font-black text-blue-900 text-xs">Punten: 0</div>
            <div id="casus-titel" class="font-black text-slate-400 text-xs uppercase tracking-widest"></div>
        </header>

        <div id="reader-view" class="hidden space-y-6">
            <div class="bg-blue-900 text-white p-6 rounded-lg shadow-lg">
                <h3 class="text-[10px] uppercase mb-2 opacity-70">Lees deze zin voor aan je partner:</h3>
                <p id="orig-tekst" class="text-xl font-serif italic"></p>
            </div>
            <div class="bg-white border-2 border-slate-200 p-6">
                <h3 class="text-[10px] uppercase mb-4 text-slate-400">Wat je partner typt:</h3>
                <p id="live-check" class="font-mono text-sm min-h-[50px] text-slate-700"></p>
                <button id="approve-btn" onclick="approve()" class="mt-6 w-full bg-emerald-600 text-white py-4 font-bold uppercase text-xs hover:bg-emerald-700 disabled:opacity-30">Correct (Duim omhoog)</button>
            </div>
        </div>

        <div id="typer-view" class="hidden space-y-6">
            <div class="bg-white border-2 border-blue-900 p-6 shadow-xl">
                <p id="casus-hint" class="text-xs font-bold text-blue-900 mb-6 uppercase italic"></p>
                <textarea id="user-input" oninput="updateTyping(this.value)" class="w-full h-40 p-4 font-mono text-sm bg-slate-50 border outline-none focus:border-blue-900" placeholder="Typ hier de moderne, objectieve versie..."></textarea>
                <p class="mt-4 text-[9px] text-slate-400 uppercase">Wacht op goedkeuring van je partner na het typen.</p>
            </div>
        </div>
    </div>
</body>
</html>
